version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: athletepro-db
    environment:
      POSTGRES_USER: athletepro
      POSTGRES_PASSWORD: athletepro123
      POSTGRES_DB: athletepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athletepro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athletepro-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: athletepro-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@athletepro.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - athletepro-network

volumes:
  postgres_data:

networks:
  athletepro-network:
    driver: bridge
